# SPDX-License-Identifier: GPL-3.0-or-later
#
# Build portable binaries for all supported platforms and attach them to
# GitHub Releases.
#
# Triggers:
#   • workflow_dispatch — "Run workflow" button in the Actions tab (beta builds)
#   • push v* tag       — fires automatically on version tags
#                         e.g. git tag v0.2.3 && git push --tags
#
# Artifacts produced per run (always downloadable for 30 days):
#   open-sstv-windows          → open-sstv-windows.zip
#   open-sstv-linux-x86_64     → open-sstv-linux-x86_64.zip
#   open-sstv-linux-x86_64-appimage → Open-SSTV-x86_64.AppImage
#   open-sstv-linux-arm64      → open-sstv-linux-arm64.zip
#   open-sstv-linux-arm64-appimage  → Open-SSTV-aarch64.AppImage
#   open-sstv-macos-arm64      → open-sstv-macos-arm64.zip
#
# macOS Intel is intentionally excluded — GitHub's ``macos-13`` runner
# pool has long queue times that stall releases, and Apple Silicon is
# the dominant modern Mac target.  Intel users on macOS can still
# install via ``pipx install open-sstv`` until a Universal2 build is
# wired up.
#
# On tag pushes all of the above are also attached to a public GitHub Release.
#
# macOS note: unsigned binaries will trigger Gatekeeper on first launch.
# Users should right-click → Open, or run:
#   xattr -d com.apple.quarantine open-sstv

name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Needed so softprops/action-gh-release@v2 can create the release and
# upload the built zips / AppImage as release assets on tag push.  Without
# ``contents: write`` the attach step fails with HTTP 403 "Resource not
# accessible by integration" and no release gets published.
permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false   # let other platforms finish even if one fails
      matrix:
        include:

          - name: Windows x86_64
            runner: windows-latest
            artifact: open-sstv-windows

          - name: Linux x86_64
            runner: ubuntu-22.04
            artifact: open-sstv-linux-x86_64
            appimage_arch: x86_64

          - name: Linux ARM64
            runner: ubuntu-22.04-arm
            artifact: open-sstv-linux-arm64
            appimage_arch: aarch64

          - name: macOS Apple Silicon
            runner: macos-14
            artifact: open-sstv-macos-arm64

    steps:
      # ── 1. Source ──────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pyinstaller-hooks-contrib

      # ── 4. Build ───────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller open_sstv.spec

      # ── 5. Verify ──────────────────────────────────────────────────────────
      - name: Verify build (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $exe = "dist\open-sstv\open-sstv.exe"
          if (-not (Test-Path $exe)) { Write-Error "$exe not found"; exit 1 }
          Write-Host "OK: $exe ($([math]::Round((Get-Item $exe).Length / 1MB, 1)) MB)"

      - name: Verify build (Unix)
        if: runner.os != 'Windows'
        run: |
          exe="dist/open-sstv/open-sstv"
          [ -f "$exe" ] || { echo "ERROR: $exe not found"; exit 1; }
          echo "OK: $exe ($(du -sh "$exe" | cut -f1))"

      # ── 6a. Package: Windows ───────────────────────────────────────────────
      - name: Zip (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\open-sstv -DestinationPath dist\${{ matrix.artifact }}.zip
          Write-Host "Archive: $([math]::Round((Get-Item dist\${{ matrix.artifact }}.zip).Length / 1MB, 1)) MB"

      # ── 6a½. Re-apply ad-hoc codesign (macOS only) ─────────────────────────
      # PyInstaller ad-hoc signs Mach-O binaries during the build, but two
      # failure modes still bite end users on Apple Silicon:
      #
      #   1. Intermediate build steps can leave dylib signatures in a
      #      state AMFI won't accept when the user unzips.  Re-signing
      #      every .dylib / .so / Python framework binary with a fresh
      #      ad-hoc signature fixes that.
      #
      #   2. PyInstaller's launcher bootloader ships with the hardened-
      #      runtime Mach-O flag baked in.  ``codesign --force --sign -``
      #      preserves that flag, so the ad-hoc-signed launcher enforces
      #      hardened-runtime library validation on its own dylibs at
      #      load time — and since the dylibs are ad-hoc-signed (team ID
      #      ``-``) the validation fails with::
      #
      #          code signature in <...> '/.../ _internal/Python' not
      #          valid for use in process: library load disallowed by
      #          system policy
      #
      #      Fix: re-sign the launcher with ``--options=runtime`` plus
      #      the ``packaging/macos-entitlements.plist`` entitlements that
      #      include ``com.apple.security.cs.disable-library-validation``.
      #      That keeps the bundle notarization-ready while telling AMFI
      #      it's OK to load the ad-hoc-signed children from the same
      #      bundle.
      #
      # Mach-O signatures live in the binary header (not xattrs) so they
      # survive the zip → download → unzip round-trip unchanged.
      - name: Re-sign bundle ad-hoc (macOS)
        if: runner.os == 'macOS'
        run: |
          cd dist/open-sstv
          # Strip old signatures from every Mach-O, then re-apply a fresh
          # plain ad-hoc signature.  --remove-signature also drops any
          # stale runtime / entitlement flags that would block reload.
          find . -type f \( -name "*.dylib" -o -name "*.so" -o -name "Python" \) \
            -exec codesign --remove-signature {} \; 2>/dev/null || true
          find . -type f \( -name "*.dylib" -o -name "*.so" -o -name "Python" \) \
            -exec codesign --force --sign - {} \;
          # Launcher gets hardened runtime + entitlements that disable
          # library validation so it can dlopen its own ad-hoc children.
          codesign --remove-signature open-sstv 2>/dev/null || true
          codesign --force --sign - \
            --options=runtime \
            --entitlements "$GITHUB_WORKSPACE/packaging/macos-entitlements.plist" \
            open-sstv
          echo "Ad-hoc signed: $(find . -type f \( -name '*.dylib' -o -name '*.so' \) | wc -l) dylibs/so + Python + launcher (entitlements applied)"
          echo "--- launcher signature verification ---"
          codesign -dv --entitlements - open-sstv 2>&1 | head -20

      # ── 6b. Package: macOS / Linux zip ─────────────────────────────────────
      - name: Zip (Unix)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r ${{ matrix.artifact }}.zip open-sstv/
          echo "Archive: $(du -sh ${{ matrix.artifact }}.zip | cut -f1)"

      # ── 6c. Package: Linux AppImage ────────────────────────────────────────
      - name: Build AppImage (Linux only)
        if: runner.os == 'Linux'
        env:
          ARCH: ${{ matrix.appimage_arch }}
        run: |
          # Build AppDir from the PyInstaller onedir output
          mkdir -p AppDir
          cp -r dist/open-sstv/* AppDir/

          # AppRun launcher — must be at the root of AppDir
          cat > AppDir/AppRun << 'APPRUN'
          #!/bin/bash
          SELF="$(readlink -f "$0")"
          HERE="${SELF%/*}"
          exec "${HERE}/open-sstv" "$@"
          APPRUN
          chmod +x AppDir/AppRun

          # .desktop file (required by appimagetool)
          cat > AppDir/open-sstv.desktop << 'DESKTOP'
          [Desktop Entry]
          Name=Open-SSTV
          Exec=open-sstv
          Icon=open-sstv
          Type=Application
          Categories=HamRadio;Network;
          Comment=Open-source SSTV transceiver for amateur radio
          DESKTOP

          # Placeholder icon — appimagetool requires one.
          # Replace assets/icon.png in the repo to use a real icon.
          if [ -f assets/icon.png ]; then
            cp assets/icon.png AppDir/open-sstv.png
          else
            python3 -c "
          from PIL import Image, ImageDraw, ImageFont
          img = Image.new('RGB', (256, 256), '#1a3a5c')
          draw = ImageDraw.Draw(img)
          draw.ellipse([28, 28, 228, 228], outline='#4fc3f7', width=8)
          draw.text((88, 100), 'SSTV', fill='#4fc3f7')
          img.save('AppDir/open-sstv.png')
          "
          fi

          # Download appimagetool for this architecture
          TOOL="appimagetool-${ARCH}.AppImage"
          wget -q "https://github.com/AppImage/appimagetool/releases/download/continuous/${TOOL}"
          chmod +x "${TOOL}"

          # Build the AppImage
          ARCH="${ARCH}" ./"${TOOL}" AppDir "Open-SSTV-${ARCH}.AppImage"
          echo "AppImage: $(du -sh Open-SSTV-${ARCH}.AppImage | cut -f1)"

      # ── 7. Upload Actions artifacts (always available for 30 days) ──────────
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.zip
          retention-days: 30

      - name: Upload AppImage artifact (Linux only)
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}-appimage
          path: Open-SSTV-*.AppImage
          retention-days: 30

      # ── 8. Attach to GitHub Release (tag pushes only) ──────────────────────
      - name: Attach zip to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.artifact }}.zip
          draft: false
          generate_release_notes: true

      - name: Attach AppImage to release (Linux only)
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Linux'
        uses: softprops/action-gh-release@v2
        with:
          files: Open-SSTV-*.AppImage
