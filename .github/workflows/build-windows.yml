# SPDX-License-Identifier: GPL-3.0-or-later
#
# Build a portable Windows executable and attach it to GitHub Releases.
#
# Triggers:
#   • workflow_dispatch — run it manually from the Actions tab at any time
#   • push v* tag       — automatically fires when you push a version tag
#                         (e.g. git tag v0.2.2 && git push --tags)
#
# Output:
#   • Actions artifact  — always uploaded, expires after 30 days
#   • Release asset     — only when triggered by a v* tag push

name: Build Windows EXE

on:
  workflow_dispatch:          # manual "Run workflow" button in the Actions tab
  push:
    tags:
      - "v*"                  # v0.2.2, v0.3.0-beta, etc.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt into Node 24 before it becomes mandatory (June 2026)

jobs:
  build:
    name: PyInstaller → Windows EXE
    runs-on: windows-latest

    steps:
      # ── 1. Source ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Dependencies ──────────────────────────────────────────────────────
      - name: Install project + PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller pyinstaller-hooks-contrib

      # ── 4. Build ─────────────────────────────────────────────────────────────
      - name: Build with PyInstaller
        run: pyinstaller open_sstv.spec

      # ── 5. Verify the exe exists before we try to zip it ────────────────────
      - name: Smoke-check build output
        shell: pwsh
        run: |
          $exe = "dist\open-sstv\open-sstv.exe"
          if (-not (Test-Path $exe)) {
            Write-Error "Build failed — $exe not found"
            exit 1
          }
          Write-Host "Found: $exe ($([math]::Round((Get-Item $exe).Length / 1MB, 1)) MB)"

      # ── 6. Package ───────────────────────────────────────────────────────────
      - name: Zip portable folder
        shell: pwsh
        run: |
          Compress-Archive -Path dist\open-sstv -DestinationPath dist\open-sstv-windows.zip
          Write-Host "Archive size: $([math]::Round((Get-Item dist\open-sstv-windows.zip).Length / 1MB, 1)) MB"

      # ── 7. Upload as Actions artifact (always — handy for manual runs) ───────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-sstv-windows
          path: dist/open-sstv-windows.zip
          retention-days: 30

      # ── 8. Attach to GitHub Release (only on tag pushes) ────────────────────
      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/open-sstv-windows.zip
          # The release is created automatically from the tag if it doesn't
          # already exist.  Draft it so you can add release notes before
          # making it public.
          draft: false
          generate_release_notes: true
