[template]
name = "73 Card"
role = "closing"
reference_frame = [320, 256]
schema_version = 1
description = "QSL card style 73. ToCall top-left, '73 de Call' bottom-right with gradient overlay."

[[layer]]
type = "photo"
id = "base_photo"
anchor = "FILL"
fit = "cover"

[[layer]]
type = "gradient"
id = "vignette"
anchor = "FILL"
from_color = [0, 0, 0, 120]
to_color = [0, 0, 0, 0]
angle_deg = 45.0

[[layer]]
type = "text"
id = "tocall_tl"
text = "%o"
anchor = "TL"
offset_x_pct = 2.0
offset_y_pct = 2.0
font_family = "DejaVu Sans Bold"
font_size_pct = 10.0
fill = [255, 255, 255, 255]
stroke = { color = [0, 0, 0, 200], width_px = 2 }
slashed_zero = true

[[layer]]
type = "text"
id = "seventy_three"
text = "73"
anchor = "BR"
offset_x_pct = 2.5
offset_y_pct = 16.0
font_family = "DejaVu Sans Bold"
font_size_pct = 28.0
fill = [255, 220, 0, 255]
stroke = { color = [0, 0, 0, 200], width_px = 4 }
slashed_zero = false

[[layer]]
type = "text"
id = "de_call"
text = "de %c"
anchor = "BR"
offset_x_pct = 2.5
offset_y_pct = 5.0
font_family = "DejaVu Sans Bold"
font_size_pct = 11.0
fill = [255, 255, 255, 255]
stroke = { color = [0, 0, 0, 180], width_px = 2 }
slashed_zero = true
