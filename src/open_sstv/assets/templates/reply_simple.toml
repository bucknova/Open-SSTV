[template]
name = "Reply Simple"
role = "reply"
reference_frame = [320, 256]
schema_version = 1
description = "Clean reply template. Own call top-right, yellow bottom strip with ToCall RST de Call."

[[layer]]
type = "photo"
id = "base_photo"
anchor = "FILL"
fit = "cover"

[[layer]]
type = "gradient"
id = "bottom_strip"
anchor = "BL"
width_pct = 100.0
height_pct = 35.0
from_color = [0, 0, 0, 0]
to_color = [200, 180, 0, 230]
angle_deg = 0.0

[[layer]]
type = "text"
id = "call_tr"
text = "%c"
anchor = "TR"
offset_x_pct = 2.0
offset_y_pct = 2.0
font_family = "DejaVu Sans Bold"
font_size_pct = 7.0
fill = [255, 255, 255, 255]
slashed_zero = true

[[layer]]
type = "text"
id = "exchange_text"
text = "%o %r de %c"
anchor = "BC"
offset_x_pct = 0.0
offset_y_pct = 7.0
font_family = "DejaVu Sans Bold"
font_size_pct = 13.0
fill = [255, 255, 255, 255]
slashed_zero = true
align = "center"
